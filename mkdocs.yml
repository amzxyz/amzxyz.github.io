site_name: 万象拼音
site_url: https://amzxyz.github.io/
site_description: 一个为提升rime拼音输入体验及生态构建的数据方案

repo_url: https://github.com/amzxyz/rime_wanxiang
repo_name: amzxyz/rime_wanxiang

theme:
  name: material
  #logo: material/leaf       # <--- 比如这里加个叶子的图标作为顶栏 Logo
  favicon: material/leaf
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到暗黑模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  
  features:
    - navigation.tabs              # 开启顶部一级大标签导航
    #- navigation.sections          # 侧边栏分段展示 (重要)
    - navigation.expand            # 默认展开所有分类目录
    - navigation.indexes           # 允许点击目录组的名称
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate        # 允许在代码块旁边加气泡注释

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list                      # <--- 必须开启：允许给元素加自定义样式类
  - md_in_html                     # <--- 必须开启：允许在 HTML(div) 里写 Markdown
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:                # <--- 必须开启：渲染 Material 图标
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

