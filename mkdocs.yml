site_name: 万象拼音
site_url: https://amzxyz.github.io/
site_description: 一个为提升rime拼音输入体验及生态构建的数据方案

repo_url: https://github.com/amzxyz/rime_wanxiang
repo_name: amzxyz/rime_wanxiang

theme:
  name: material
  #logo: material/leaf       # <--- 比如这里加个叶子的图标作为顶栏 Logo
  favicon: material/leaf
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到暗黑模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  
  features:
    - navigation.tabs              # 开启顶部一级大标签导航
    #- navigation.sections          # 侧边栏分段展示 (重要)
    - navigation.expand            # 默认展开所有分类目录
    - navigation.indexes           # 允许点击目录组的名称
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate        # 允许在代码块旁边加气泡注释

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list                      # <--- 必须开启：允许给元素加自定义样式类
  - md_in_html                     # <--- 必须开启：允许在 HTML(div) 里写 Markdown
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:                # <--- 必须开启：渲染 Material 图标
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# 万象功能分类体系
nav:
  - 🏠 首页: index.md
  
  - 🚀 快速上手:
        - 方案介绍与版本对比: doc/intro.md
        - 🪟 Windows:
            - Weasel (小狼毫): doc/weasel.md
        - 🍎 macOS:
            - Squirrel (鼠须管): doc/squirrel.md
            - Fcitx5-macOS （小企鹅）: doc/fcitx5-mac.md
        - 🐧 Linux:
            - Fcitx5-Linux （小企鹅）: doc/fcitx5-linux.md
            - ibus-rime: doc/ibus-rime.md
        - 📱 iOS:
            - Hamster (仓输入法): doc/hamster.md
            - Hamster3 (元书输入法): doc/hamster3.md
        - 🤖 Android:
            - Trime (同文输入法): doc/trime.md
            - Fcitx5-Android: doc/fcitx5-android.md
        - ⭕ 鸿蒙 HarmonyOS NEXT:
            - 超越输入法: doc/chaoyue.md
        - ⚙️ 进阶安装:
            - 使用万象工具链: doc/tools.md
            - 使用东风破 Plum: doc/plum.md
            - 手动设置: doc/manual.md
      
  - ⌨️ 核心输入体系:
      - 辅助码系统全解: doc/aux_code.md     # 包含直接/间接辅码、候选筛选、输入前反查、声调辅查
      - 中英混输与独立英文: doc/english_mixed.md
      - 14/18键特殊键盘转写: doc/t9_layouts.md
      - 错音错字与造词系统: doc/word_creation.md # 包含按需造词、无感造词、错音提示
      
  - 🪄 超强Lua魔法扩展:
      - 📅 时间日期(Shijian): doc/shijian.md
      - 💬 超级注释(Super Comment): doc/super_comment.md
      - 💡 智能提示(Super Tips): doc/super_tips.md
      - ⚡ 快速符号(Quick Symbol): doc/quick_symbol.md
      - 📦 成对符号(Paired Symbols): doc/paired_symbols.md
      - 🔢 按键事件(Super Processor): doc/super_processor.md
      - 🔄 超级替换(Super Replacer): doc/super_replacer.md
      
  - 🛠️ 进阶配置:
      - rime工作机制: doc/Rime设计逻辑与配置哲学.md
      - patch方法论: doc/patch方法论.md
      - 自定义万象方案: doc/schema_custom.md
      - 词库与数据管理: doc/data_dict.md
      - RIME输入法方案配置手册: doc/RIME输入法方案配置手册.md
      - RIME配置指南: doc/RIME配置指南.md
      
  - 🌍 生态与附录:
      - 万象双拼键位图: doc/wanxiang_shuangpin.md
      - 衍生方案与鸣谢: doc/ecosystem.md
      - 赞赏支持: doc/donate.md

